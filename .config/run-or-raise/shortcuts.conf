<Super>w w,google-chrome,google-chrome,
<Super>w <Shift>w,google-chrome --new-window

<Super>w e,code,code,
<Super>w <Shift>e,code --new-window

<Super>w s:raise-or-register(app_s)
<Super>w <Shift>s:register(app_s)

<Super>w d:raise-or-register(app_d)
<Super>w <Shift>d:register(app_d)

<Super>w r:minimize-when-unfocused:switch-back-when-focused:move-window-to-active-workspace,ghostty,com.mitchellh.ghostty,
<Super>w <Shift>r,ghostty +new-window

<Super>w f:minimize-when-unfocused:switch-back-when-focused:move-window-to-active-workspace,nautilus,org.gnome.Nautilus,
<Super>w <Shift>f,nautilus --new-window

<Super>w q:raise-or-register(app_q):switch-back-when-focused:minimize-when-unfocused:move-window-to-active-workspace
<Super>w <Shift>q:register(app_q)

<Super>w a:raise-or-register(app_a):switch-back-when-focused:minimize-when-unfocused:move-window-to-active-workspace
<Super>w <Shift>a:register(app_a)

<Super>w v,copyq toggle

<Alt><Shift>1,sh -c "gdbus call -e -d org.gnome.Shell -o /dev/duc/Sizer -m dev.duc.Sizer.MoveInWorkArea 25 25"
<Alt><Shift>2,sh -c "gdbus call -e -d org.gnome.Shell -o /dev/duc/Sizer -m dev.duc.Sizer.MoveInWorkArea 50 50"
<Alt><Shift>3,sh -c "gdbus call -e -d org.gnome.Shell -o /dev/duc/Sizer -m dev.duc.Sizer.MoveInWorkArea 75 75"
<Alt><Shift>c,sh -c "gdbus call -e -d org.gnome.Shell -o /dev/duc/Sizer -m dev.duc.Sizer.CenterInWorkArea"
<Alt><Shift>f,sh -c "gdbus call -e -d org.gnome.Shell -o /dev/duc/Sizer -m dev.duc.Sizer.Resize 890 550"
<Alt><Shift>i,sh -c "gdbus call -e -d org.gnome.Shell -o /dev/duc/Sizer -m dev.duc.Sizer.Get"
<Alt><Shift>x,sh -c "gdbus call -e -d org.gnome.Shell -o /dev/duc/Sizer -m dev.duc.Sizer.MoveResizeInWorkArea 16 16 1300 1000"
<Alt><Shift>b,sh -c "gdbus call -e -d org.gnome.Shell -o /dev/duc/Sizer -m dev.duc.Sizer.Resize 1416 875"
<Alt><Shift>m,sh -c "gdbus call -e -d org.gnome.Shell -o /dev/duc/Sizer -m dev.duc.Sizer.Resize 1214 750"
<Alt><Shift>s,sh -c "gdbus call -e -d org.gnome.Shell -o /dev/duc/Sizer -m dev.duc.Sizer.Resize 1011 625"

<Ctrl><Shift>Escape,ghostty -e btop
